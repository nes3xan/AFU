<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель – AdsForYou</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .svc-form {
            display: none;
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--sp-lg);
            margin-top: var(--sp-md);
            margin-bottom: var(--sp-lg);
        }
        .svc-form.open {
            display: block;
        }
        .svc-form h3 {
            margin-top: 0;
            margin-bottom: var(--sp-md);
            color: var(--text-dark);
        }
        .svc-field {
            margin-bottom: var(--sp-md);
        }
        .svc-field label {
            display: block;
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        .svc-field input,
        .svc-field textarea {
            display: block;
            width: 100%;
            max-width: 560px;
            padding: 9px var(--sp-md);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 0.95rem;
            color: var(--text-dark);
            background: var(--white);
            transition: var(--trans);
            outline: none;
        }
        .svc-field textarea {
            min-height: 90px;
            resize: vertical;
        }
        .svc-field input:focus,
        .svc-field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .svc-field input.field-error,
        .svc-field textarea.field-error {
            border-color: #B52A2A;
            box-shadow: 0 0 0 3px #FEE2E2;
        }
        .field-err {
            display: none;
            color: #B52A2A;
            font-size: 0.82em;
            margin-top: 4px;
        }
        .field-err.visible {
            display: block;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: var(--sp-lg);
        }
        .btn-delete {
            background: #DC2626;
            color: var(--white);
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font);
            font-weight: 600;
            margin: 2px;
            transition: var(--trans);
        }
        .btn-delete:hover {
            background: #B91C1C;
        }
        .btn-cancel {
            background: #64748B;
            color: var(--white);
            border: none;
            padding: 11px var(--sp-xl);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95rem;
            font-family: var(--font);
            font-weight: 600;
            transition: var(--trans);
        }
        .btn-cancel:hover {
            background: #475569;
        }
        .admin-notice {
            padding: 10px var(--sp-md);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: var(--sp-md);
            display: none;
        }
        .admin-notice.success {
            background: #D8F3DC;
            color: #2D6A4F;
            border: 1px solid #B7E4C7;
            display: block;
        }
        .admin-notice.error {
            background: #FDE8E8;
            color: #B52A2A;
            border: 1px solid #F5C6C6;
            display: block;
        }
        .badge-crud {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid #BFDBFE;
            border-radius: 4px;
            padding: 2px 9px;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 0.5px;
            vertical-align: middle;
            margin-left: var(--sp-sm);
        }
        .svc-table td {
            vertical-align: top;
        }
        .svc-table td:last-child {
            white-space: nowrap;
        }
        .access-denied {
            padding: 30px 0;
        }
        .access-denied p {
            color: #cbd5e1;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-active {
            background: #D8F3DC;
            color: #2D6A4F;
        }
        .status-pending {
            background: #FEF9C3;
            color: #854D0E;
        }
        .status-new {
            background: var(--accent-soft);
            color: var(--accent);
        }
    </style>
</head>
<body id="page-admin">

    <header>
        <h1>AdsForYou: Панель керування (CRM)</h1>
        <p>Робочий простір адміністратора.</p>
        <hr>
    </header>

    <nav>
        <ul>
            <li><a href="#section-dashboard">Дашборд</a></li>
            <li><a href="#section-users">Користувачі</a></li>
            <li><a href="#section-services">Управління послугами</a></li>
            <li><a href="index.html">Перейти на сайт</a></li>
            <li><a href="#" onclick="doLogout(); return false;">Вийти (Logout)</a></li>
        </ul>
        <hr>
    </nav>

    <main id="admin-main">
    </main>

    <footer>
        <hr>
        <p>&copy; 2024 AdsForYou. Внутрішня система керування (Confidential).</p>
    </footer>

    <script>
    var SERVICES_KEY = 'afu_services';

    var mainEl     = document.getElementById('admin-main');
    var formState  = null;
    var pendingMsg = null;

    function getCurrentUser() {
        var raw = localStorage.getItem('afu_current_user');
        return raw ? JSON.parse(raw) : null;
    }

    function doLogout() {
        localStorage.removeItem('afu_current_user');
        window.location.href = 'login.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;')
            .replace(/'/g,  '&#39;');
    }

    var currentUser = getCurrentUser();

    if (!currentUser || currentUser.role !== 'admin') {
        mainEl.innerHTML =
            '<section class="access-denied">' +
            '<h2>Доступ заборонено</h2>' +
            '<p>Ця сторінка доступна лише адміністратору системи.</p>' +
            '<p>Будь ласка, увійдіть як адміністратор.</p>' +
            '<p>Переадресація на сторінку входу...</p>' +
            '</section>';
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 2500);
    } else {
        initPanel();
    }

    function getServices() {
        var raw = localStorage.getItem(SERVICES_KEY);
        if (raw) return JSON.parse(raw);
        var defaults = [
            { id: 1, title: 'Instagram реклама', description: 'Налаштування таргетованих рекламних кампаній в Instagram з детальним підбором аудиторії та цілей просування.', price: '5 000 грн' },
            { id: 2, title: 'TikTok реклама', description: 'Запуск рекламних кампаній у TikTok Ads Manager з урахуванням алгоритмів платформи та поведінки аудиторії.', price: '4 500 грн' },
            { id: 3, title: 'Створення Reels', description: 'Розробка сценарію, організація зйомки та монтаж коротких відео для Instagram та TikTok.', price: '3 000 грн' },
            { id: 4, title: 'Контент-план', description: 'Детальний контент-план на місяць: теми, формати, рубрики та рекомендовані дні для публікацій.', price: '1 500 грн' },
            { id: 5, title: 'Дизайн постів', description: 'Створення візуального оформлення постів у єдиному стилі бренду: шаблони, кольорова палітра, типографіка.', price: '2 000 грн' },
            { id: 6, title: 'Ведення сторінок', description: 'Повне ведення Instagram або TikTok: публікації, відповіді на коментарі, щомісячна аналітика.', price: '8 000 грн' }
        ];
        saveServices(defaults);
        return defaults;
    }

    function saveServices(list) {
        localStorage.setItem(SERVICES_KEY, JSON.stringify(list));
    }

    function nextId(list) {
        if (!list || !list.length) return 1;
        var ids = list.map(function(s) { return s.id; });
        return Math.max.apply(null, ids) + 1;
    }

    function getUsers() {
        var raw = localStorage.getItem('afu_users');
        return raw ? JSON.parse(raw) : [];
    }

    function initPanel() {
        renderPanel();
    }

    function renderPanel() {
        var services   = getServices();
        var users      = getUsers();
        var formIsOpen = (formState !== null);

        var editSvc = null;
        if (typeof formState === 'number') {
            for (var i = 0; i < services.length; i++) {
                if (services[i].id === formState) {
                    editSvc = services[i];
                    break;
                }
            }
        }

        var formHeading = (editSvc) ? 'Редагування послуги' : 'Нова послуга';

        var now = new Date();
        var timeStr = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

        var html =
            '<section id="section-dashboard">' +
            '<h2>Огляд системи</h2>' +
            '<article>' +
            '<p><strong>Адміністратор:</strong> ' + escapeHtml(currentUser.firstName) + ' (Головний менеджер)</p>' +
            '<p><strong>Останній вхід:</strong> Сьогодні о ' + timeStr + '</p>' +
            '<p><strong>Сповіщення системи:</strong> Зареєстрованих користувачів у системі: ' + users.length + '.</p>' +
            '</article>' +
            '</section>' +

            '<section id="section-users">' +
            '<h2>Керування базою клієнтів (Користувачі)</h2>' +
            '<p>Список зареєстрованих користувачів у системі:</p>';

        if (users.length === 0) {
            html += '<p>Зареєстрованих користувачів поки немає.</p>';
        } else {
            html +=
                '<table border="1" cellpadding="8" cellspacing="0" width="100%">' +
                '<thead><tr>' +
                '<th>ID</th>' +
                '<th>ПІБ Клієнта</th>' +
                '<th>Email</th>' +
                '<th>Дата реєстрації</th>' +
                '<th>Дії</th>' +
                '</tr></thead>' +
                '<tbody>';

            for (var u = 0; u < users.length; u++) {
                var usr = users[u];
                html +=
                    '<tr>' +
                    '<td>' + (1000 + u + 1) + '</td>' +
                    '<td>' + escapeHtml(usr.firstName) + ' ' + escapeHtml(usr.lastName) + '</td>' +
                    '<td>' + escapeHtml(usr.email) + '</td>' +
                    '<td>' + escapeHtml(usr.registeredAt || '—') + '</td>' +
                    '<td>' +
                    '<button type="button" onclick="deleteUser(' + u + ')">Видалити</button>' +
                    '</td>' +
                    '</tr>';
            }

            html += '</tbody></table>';
        }

        html += '</section>' +

            '<section id="section-services">' +
            '<h2>Керування каталогом послуг' +
            '<span class="badge-crud">CRUD</span>' +
            '</h2>' +
            '<p>Перегляд, додавання, редагування та видалення послуг агентства.</p>' +
            '<div id="admin-notice" class="admin-notice"></div>' +

            '<p><button type="button" onclick="openAddForm()">+ Додати нову послугу</button></p>' +

            '<div id="svc-form" class="svc-form' + (formIsOpen ? ' open' : '') + '">' +
            '<h3>' + formHeading + '</h3>' +
            '<div class="svc-field">' +
            '<label for="f-title">Назва послуги:</label>' +
            '<input type="text" id="f-title" placeholder="Наприклад: Instagram реклама">' +
            '<span class="field-err" id="e-title"></span>' +
            '</div>' +
            '<div class="svc-field">' +
            '<label for="f-desc">Опис послуги:</label>' +
            '<textarea id="f-desc" placeholder="Коротко опишіть послугу..."></textarea>' +
            '<span class="field-err" id="e-desc"></span>' +
            '</div>' +
            '<div class="svc-field">' +
            '<label for="f-price">Ціна:</label>' +
            '<input type="text" id="f-price" placeholder="Наприклад: 5 000 грн">' +
            '<span class="field-err" id="e-price"></span>' +
            '</div>' +
            '<div class="form-actions">' +
            '<button type="button" onclick="saveService()">Зберегти</button>' +
            '<button type="button" class="btn-cancel" onclick="closeForm()">Скасувати</button>' +
            '</div>' +
            '</div>' +

            '<table border="1" cellpadding="8" cellspacing="0" width="100%" class="svc-table">' +
            '<thead><tr>' +
            '<th>Назва</th>' +
            '<th>Опис</th>' +
            '<th>Ціна</th>' +
            '<th>Дії</th>' +
            '</tr></thead>' +
            '<tbody>';

        if (services.length === 0) {
            html += '<tr><td colspan="4">Послуг поки немає. Додайте першу послугу кнопкою вище.</td></tr>';
        } else {
            for (var j = 0; j < services.length; j++) {
                var s = services[j];
                html +=
                    '<tr>' +
                    '<td><strong>' + escapeHtml(s.title) + '</strong></td>' +
                    '<td>' + escapeHtml(s.description) + '</td>' +
                    '<td>' + escapeHtml(s.price) + '</td>' +
                    '<td>' +
                    '<button type="button" onclick="openEditForm(' + s.id + ')">Редагувати</button>' +
                    '<button type="button" class="btn-delete" onclick="deleteService(' + s.id + ')">Видалити</button>' +
                    '</td>' +
                    '</tr>';
            }
        }

        html += '</tbody></table></section>';

        mainEl.innerHTML = html;

        if (editSvc) {
            document.getElementById('f-title').value = editSvc.title;
            document.getElementById('f-desc').value  = editSvc.description;
            document.getElementById('f-price').value = editSvc.price;
        }

        if (formIsOpen) {
            var formEl = document.getElementById('svc-form');
            if (formEl) formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        if (pendingMsg) {
            var noticeEl = document.getElementById('admin-notice');
            if (noticeEl) {
                noticeEl.textContent = pendingMsg.text;
                noticeEl.className   = 'admin-notice ' + pendingMsg.type;
                var elRef = noticeEl;
                setTimeout(function() { elRef.className = 'admin-notice'; }, 3500);
            }
            pendingMsg = null;
        }
    }

    function deleteUser(index) {
        var users = getUsers();
        if (!users[index]) return;
        var confirmed = confirm(
            'Видалити користувача ' + users[index].firstName + ' ' + users[index].lastName + '?\n' +
            'Цю дію буде виконано безповоротно.'
        );
        if (!confirmed) return;
        users.splice(index, 1);
        localStorage.setItem('afu_users', JSON.stringify(users));
        pendingMsg = { text: 'Користувача успішно видалено.', type: 'success' };
        renderPanel();
    }

    function openAddForm() {
        formState = 'add';
        renderPanel();
    }

    function openEditForm(id) {
        formState = id;
        renderPanel();
    }

    function closeForm() {
        formState = null;
        renderPanel();
    }

    function clearFormErrors() {
        ['f-title', 'f-desc', 'f-price'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove('field-error');
        });
        ['e-title', 'e-desc', 'e-price'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) { el.textContent = ''; el.classList.remove('visible'); }
        });
    }

    function showFieldError(fieldId, errId, message) {
        var field = document.getElementById(fieldId);
        var err   = document.getElementById(errId);
        if (field) field.classList.add('field-error');
        if (err)   { err.textContent = message; err.classList.add('visible'); }
    }

    function saveService() {
        clearFormErrors();
        var title = document.getElementById('f-title').value.trim();
        var desc  = document.getElementById('f-desc').value.trim();
        var price = document.getElementById('f-price').value.trim();
        var valid = true;

        if (!title) {
            showFieldError('f-title', 'e-title', 'Будь ласка, введіть назву послуги.');
            valid = false;
        } else if (title.length < 3) {
            showFieldError('f-title', 'e-title', 'Назва повинна містити мінімум 3 символи.');
            valid = false;
        }
        if (!desc) {
            showFieldError('f-desc', 'e-desc', 'Будь ласка, введіть опис послуги.');
            valid = false;
        }
        if (!price) {
            showFieldError('f-price', 'e-price', 'Будь ласка, введіть ціну послуги.');
            valid = false;
        }
        if (!valid) return;

        var services = getServices();
        var message  = '';

        if (formState === 'add') {
            services.push({ id: nextId(services), title: title, description: desc, price: price });
            saveServices(services);
            message = 'Послугу "' + title + '" успішно додано до каталогу.';
        } else {
            for (var i = 0; i < services.length; i++) {
                if (services[i].id === formState) {
                    services[i].title       = title;
                    services[i].description = desc;
                    services[i].price       = price;
                    break;
                }
            }
            saveServices(services);
            message = 'Послугу "' + title + '" успішно оновлено.';
        }

        formState  = null;
        pendingMsg = { text: message, type: 'success' };
        renderPanel();
    }

    function deleteService(id) {
        var services = getServices();
        var target   = null;
        for (var i = 0; i < services.length; i++) {
            if (services[i].id === id) { target = services[i]; break; }
        }
        if (!target) return;

        var confirmed = confirm(
            'Видалити послугу "' + target.title + '"?\n' +
            'Цю дію буде виконано безповоротно.'
        );
        if (!confirmed) return;

        saveServices(services.filter(function(s) { return s.id !== id; }));
        if (formState === id) formState = null;
        pendingMsg = { text: 'Послугу "' + target.title + '" видалено з каталогу.', type: 'success' };
        renderPanel();
    }
    </script>

</body>
</html>
