<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій кабінет – AdsForYou</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="page-profile">

    <header>
        <h1>AdsForYou</h1>
        <p>Особистий кабінет клієнта</p>
        <hr>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="profile.html">Особистий кабінет</a></li>
            <li><a href="#" onclick="handleLogout(); return false;">Вийти</a></li>
        </ul>
        <hr>
    </nav>

    <main id="profile-main">
    </main>

    <footer>
        <hr>
        <p>&copy; 2024 AdsForYou. Усі права захищені.</p>
    </footer>

    <script>
    function getCurrentUser() {
        var raw = localStorage.getItem('afu_current_user');
        return raw ? JSON.parse(raw) : null;
    }

    function handleLogout() {
        localStorage.removeItem('afu_current_user');
        window.location.href = 'login.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,  '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;')
            .replace(/'/g,  '&#39;');
    }

    var main = document.getElementById('profile-main');
    var user = getCurrentUser();

    if (!user) {
        window.location.href = 'login.html';
    } else {
        var isAdmin = (user.role === 'admin');

        var profileRows = '';
        if (!isAdmin) {
            profileRows +=
                '<tr><td><strong>Ім\'я:</strong></td><td>' + escapeHtml(user.firstName) + '</td></tr>' +
                '<tr><td><strong>Прізвище:</strong></td><td>' + escapeHtml(user.lastName) + '</td></tr>';
        }
        profileRows +=
            '<tr><td><strong>Email:</strong></td><td>' + escapeHtml(user.email) + '</td></tr>' +
            '<tr><td><strong>Дата реєстрації:</strong></td><td>' + escapeHtml(user.registeredAt) + '</td></tr>' +
            '<tr><td><strong>Статус акаунта:</strong></td><td>' +
                (isAdmin ? '<strong>Адміністратор</strong>' : 'Активний клієнт') +
            '</td></tr>';

        var secondSection = '';

        if (isAdmin) {
            secondSection =
                '<section>' +
                '<h3>Панель адміністратора</h3>' +
                '<p>Ви увійшли до системи як адміністратор. ' +
                'Вам доступна панель керування послугами агентства.</p>' +
                '<p>' +
                '<a href="admin.html">' +
                '<button type="button">Відкрити адмін-панель</button>' +
                '</a>' +
                '</p>' +
                '</section>';
        } else {
            secondSection =
                '<section>' +
                '<h3>Інформація про послуги</h3>' +
                '<p><strong>Ваш персональний менеджер:</strong> Юлія (Telegram: @yulia_adsforyou)</p>' +
                '<h4>Таблиця активних послуг</h4>' +
                '<table border="1" cellpadding="8" cellspacing="0" width="100%">' +
                '<thead>' +
                '<tr>' +
                '<th>Назва послуги</th>' +
                '<th>Дата початку</th>' +
                '<th>Статус</th>' +
                '<th>Звітність</th>' +
                '</tr>' +
                '</thead>' +
                '<tbody>' +
                '<tr>' +
                '<td>Ведення Instagram (Комплекс)</td>' +
                '<td>01.11.2024</td>' +
                '<td>В процесі роботи</td>' +
                '<td><a href="#">Завантажити звіт</a></td>' +
                '</tr>' +
                '<tr>' +
                '<td>Таргетована реклама (TikTok)</td>' +
                '<td>10.12.2024</td>' +
                '<td>Активна кампанія</td>' +
                '<td>Звіт очікується</td>' +
                '</tr>' +
                '<tr>' +
                '<td>Розробка контент-плану</td>' +
                '<td>15.10.2024</td>' +
                '<td>Завершено</td>' +
                '<td><a href="#">Завантажити PDF</a></td>' +
                '</tr>' +
                '</tbody>' +
                '</table>' +
                '<br>' +
                '<form action="services.html" method="get">' +
                '<button type="submit">Замовити нову послугу</button>' +
                '</form>' +
                '</section>';
        }

        main.innerHTML =
            '<h2>Вітаємо у вашому кабінеті, ' +
                (isAdmin ? 'Адміністратор' : escapeHtml(user.firstName)) +
            '!</h2>' +
            (isAdmin
                ? '<p>Ви увійшли до системи як адміністратор агентства AdsForYou.</p>'
                : '<p>Тут ви можете переглянути свої дані та відстежувати співпрацю з агентством.</p>'
            ) +
            '<section>' +
            '<h3>Ваші дані профілю</h3>' +
            '<table border="1" cellpadding="8" cellspacing="0">' +
            '<tbody>' + profileRows + '</tbody>' +
            '</table>' +
            '<br>' +
            '<button type="button" onclick="handleLogout()">Вийти з системи</button>' +
            '</section>' +
            '<hr>' +
            secondSection;
    }
    </script>

</body>
</html>
